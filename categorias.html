<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorem | Categorias</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-wrapper {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 32px 20px 16px;
            max-width: 980px;
            margin: 0 auto;
            gap: 24px;
        }

        .site-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 24px 28px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(226, 232, 240, 0.9);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: var(--primary);
            color: white;
            font-weight: 800;
            font-size: 1.15rem;
        }

        .brand strong {
            display: block;
            font-size: 1.4rem;
        }

        .brand p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .site-nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .site-nav a {
            padding: 12px 18px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.08);
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s, color 0.2s;
        }

        .site-nav a.active,
        .site-nav a:hover {
            background: var(--primary);
            color: white;
        }

        .container {
            max-width: 720px;
            margin: auto;
        }

        header {
            margin-bottom: 28px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .grid {
            display: grid;
            gap: 20px;
        }

        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
        }

        .category-list {
            display: grid;
            gap: 12px;
        }

        .category-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg);
        }

        .category-item strong {
            color: var(--text-main);
        }

        .category-item button {
            border: none;
            background: transparent;
            color: var(--danger);
            cursor: pointer;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-size: 1rem;
        }

        .btn-add {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-add:hover {
            background: var(--primary-hover);
        }

        .footer {
            padding: 18px 20px;
            background: white;
            border-top: 1px solid rgba(226, 232, 240, 1);
            text-align: center;
            border-radius: 0 0 16px 16px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="brand">
                <span class="brand-mark">V</span>
                <div>
                    <strong>Valorem</strong>
                    <p>Gestão de fluxo financeiro</p>
                </div>
            </div>
            <nav class="site-nav">
                <a href="index.html">Dashboard</a>
                <a href="cadastro.html">Cadastrar</a>
                <a href="categorias.html" class="active">Categorias</a>
            </nav>
        </header>

        <main class="main-content">
            <div class="container">
                <header>
                    <h1>Categorias</h1>
                    <p>Organize suas despesas por categoria e adicione novas categorias conforme precisar.</p>
                </header>

                <div class="grid">
                    <div class="card">
                        <div class="form-group">
                            <label for="novaCategoria">Nova categoria</label>
                            <input id="novaCategoria" type="text" placeholder="Ex: Saúde, Lazer, Educação">
                        </div>
                        <button class="btn-add" onclick="adicionarCategoria()">
                            <i data-lucide="plus-circle"></i> Adicionar categoria
                        </button>
                    </div>

                    <div class="card">
                        <h2 style="margin-bottom:16px;">Categorias existentes</h2>
                        <div id="listaCategorias" class="category-list"></div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">© 2026 Valorem. Gestão financeira em um único painel.</footer>
    </div>
    <script>
        function obterCategorias() {
            const item = localStorage.getItem('valoremCategorias');
            if (!item) return [];
            try {
                return JSON.parse(item);
            } catch {
                return [];
            }
        }

        function salvarCategorias(categorias) {
            localStorage.setItem('valoremCategorias', JSON.stringify(categorias));
        }

        function inicializarCategorias() {
            let categorias = obterCategorias();
            if (!categorias || categorias.length === 0) {
                categorias = ['Moradia', 'Alimentação', 'Transporte', 'Outros'];
                salvarCategorias(categorias);
            }
            return categorias;
        }

        function renderizarCategorias() {
            const categorias = inicializarCategorias();
            const lista = document.getElementById('listaCategorias');
            if (categorias.length === 0) {
                lista.innerHTML = '<p style="color: var(--text-muted);">Nenhuma categoria registrada.</p>';
                return;
            }
            lista.innerHTML = categorias.map((categoria, index) => `
                <div class="category-item">
                    <strong>${categoria}</strong>
                    <button onclick="removerCategoria(${index})">Remover</button>
                </div>
            `).join('');
        }

        function adicionarCategoria() {
            const input = document.getElementById('novaCategoria');
            const valor = input.value.trim();
            if (!valor) {
                alert('Digite o nome de uma categoria.');
                return;
            }
            const categorias = inicializarCategorias();
            if (categorias.includes(valor)) {
                alert('Categoria já existente.');
                return;
            }
            categorias.push(valor);
            salvarCategorias(categorias);
            input.value = '';
            renderizarCategorias();
            alert('Categoria adicionada com sucesso.');
        }

        function removerCategoria(index) {
            const categorias = inicializarCategorias();
            categorias.splice(index, 1);
            salvarCategorias(categorias);
            renderizarCategorias();
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderizarCategorias();
            lucide.createIcons();
        });
    </script>
</body>
</html>
