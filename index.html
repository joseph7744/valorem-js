<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorem | Dashboard</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .page-wrapper {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 32px 20px 16px;
            max-width: 980px;
            margin: 0 auto;
            gap: 24px;
        }

        .site-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 24px 28px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
            border: 1px solid rgba(226, 232, 240, 0.9);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: var(--primary);
            color: white;
            font-weight: 800;
            font-size: 1.15rem;
        }

        .brand strong {
            display: block;
            font-size: 1.4rem;
        }

        .brand p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .site-nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .site-nav a {
            padding: 12px 18px;
            border-radius: 999px;
            background: rgba(37, 99, 235, 0.08);
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s, color 0.2s;
        }

        .site-nav a.active,
        .site-nav a:hover {
            background: var(--primary);
            color: white;
        }

        main.main-content {
            flex: 1;
        }

        .footer {
            padding: 18px 20px;
            background: white;
            border-top: 1px solid rgba(226, 232, 240, 1);
            text-align: center;
            border-radius: 0 0 16px 16px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .container { 
            max-width: 700px; 
            margin: auto; 
        }

        header {
            margin-bottom: 32px;
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.025em;
        }

        /* Botão Flutuante */
        .btn-cadastrar {
            background: var(--primary);
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            font-size: 1rem;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            margin-bottom: 24px;
        }

        .btn-cadastrar:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
        }

        /* Totais */
        .totais-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .filters-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .filter-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
        }

        .filter-card label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .filter-card select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #ffffff;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .total-box {
            background: linear-gradient(135deg, var(--primary) 0%, #3b82f6 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .total-box.receita {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .total-box.despesa {
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }

        .total-box.saldo {
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);
        }

        .total-box .label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .total-box .value {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        /* Lista e Cards */
        .card { 
            background: var(--card-bg); 
            padding: 16px 20px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: transform 0.1s, border-color 0.2s;
        }

        .card:hover { 
            border-color: var(--primary); 
            transform: translateX(4px);
        }

        .info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 2px; }
        .info p { font-size: 0.85rem; color: var(--text-muted); }
        .valor-tag { font-weight: 700; color: var(--text-main); }
        .valor-tag.receita { color: #10b981; }
        .valor-tag.despesa { color: #ef4444; }

        .actions { display: flex; gap: 8px; }

        .btn-editar { background: #f1f5f9; color: var(--text-main); border: 1px solid var(--border); padding: 8px; }
        .btn-editar:hover { background: var(--border); }

        .btn-excluir { background: #fee2e2; color: var(--danger); padding: 8px; }
        .btn-excluir:hover { background: #fecaca; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="brand">
                <span class="brand-mark">V</span>
                <div>
                    <strong>Valorem</strong>
                    <p>Gestão de fluxo financeiro</p>
                </div>
            </div>
            <nav class="site-nav">
                <a href="index.html" class="active">Dashboard</a>
                <a href="cadastro.html">Cadastrar</a>
                <a href="categorias.html">Categorias</a>
            </nav>
        </header>

        <main class="main-content">
            <div class="container">
                <header>
                    <h1>Valorem <span style="color: var(--primary)">.</span></h1>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Gerenciamento de Fluxo de Caixa</p>
                </header>

                <!-- Botão de Cadastro -->
                <a href="cadastro.html" class="btn-cadastrar">
                    <i data-lucide="plus-circle"></i>
                    Cadastrar Nova Transação
                </a>

                <div class="filters-row">
                    <div class="filter-card">
                        <label for="categoryFilter">Filtrar por categoria</label>
                        <select id="categoryFilter" onchange="atualizarFiltros()">
                            <option value="">Todas as categorias</option>
                        </select>
                    </div>
                    <div class="filter-card">
                        <label for="monthFilter">Filtrar por mês</label>
                        <select id="monthFilter" onchange="atualizarFiltros()">
                            <option value="">Todos os meses</option>
                        </select>
                    </div>
                </div>

                <!-- Totais -->
                <div class="totais-container">
                    <div class="total-box receita">
                        <div class="label">Total Receitas</div>
                        <div class="value" id="totalReceitas">R$ 0,00</div>
                    </div>
                    <div class="total-box despesa">
                        <div class="label">Total Despesas</div>
                        <div class="value" id="totalDespesas">R$ 0,00</div>
                    </div>
                    <div class="total-box saldo">
                        <div class="label">Saldo Atual</div>
                        <div class="value" id="saldoAtual">R$ 0,00</div>
                    </div>
                </div>

                <!-- Lista de Despesas -->
                <div id="lista">
                    <div class="loading">Carregando despesas...</div>
                </div>
            </div>
        </main>

        <footer class="footer">© 2026 Valorem. Gestão financeira em um único painel.</footer>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/transacoes';
        let transacoes = [];

        // Formatar valor em Real (PT-BR)
        function formatarValor(valor) {
            return parseFloat(valor).toLocaleString('pt-BR', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }

        // Formatar data em formato brasileiro
        function formatarData(dataString) {
            const data = new Date(dataString);
            return data.toLocaleDateString('pt-BR');
        }

        function obterCategorias() {
            const item = localStorage.getItem('valoremCategorias');
            if (!item) return [];
            try {
                return JSON.parse(item);
            } catch {
                return [];
            }
        }

        function formatarMesNome(anoMes) {
            const [ano, mes] = anoMes.split('-');
            const data = new Date(`${ano}-${mes}-01`);
            return new Intl.DateTimeFormat('pt-BR', { month: 'long', year: 'numeric' }).format(data);
        }

        function obterMesesDisponiveis(transacoes) {
            const meses = transacoes
                .map(item => item.data ? item.data.slice(0, 7) : '')
                .filter(Boolean);
            return [...new Set(meses)].sort();
        }

        function popularFiltros(transacoes, categoriasPorTransacao) {
            const categoryFilter = document.getElementById('categoryFilter');
            const monthFilter = document.getElementById('monthFilter');
            const categorias = obterCategorias();
            const meses = obterMesesDisponiveis(transacoes);

            categoryFilter.innerHTML = `<option value="">Todas as categorias</option>` + categorias.map(c => `
                <option value="${c}">${c}</option>
            `).join('');

            monthFilter.innerHTML = `<option value="">Todos os meses</option>` + meses.map(m => `
                <option value="${m}">${formatarMesNome(m)}</option>
            `).join('');

            const selecionadoCategoria = categoryFilter.dataset.selected || '';
            const selecionadoMes = monthFilter.dataset.selected || '';
            if (selecionadoCategoria) categoryFilter.value = selecionadoCategoria;
            if (selecionadoMes) monthFilter.value = selecionadoMes;
        }

        function carregarMapaCategorias() {
            const item = localStorage.getItem('valoremCategoriaPorTransacao');
            if (!item) return {};
            try {
                return JSON.parse(item);
            } catch {
                return {};
            }
        }

        function aplicarFiltros(transacoes, categoriasPorTransacao) {
            const categoriaSelecionada = document.getElementById('categoryFilter').value;
            const mesSelecionado = document.getElementById('monthFilter').value;

            return transacoes.filter(t => {
                const categoria = categoriasPorTransacao[t.id] || 'Sem categoria';
                const correspondeCategoria = !categoriaSelecionada || categoria === categoriaSelecionada;
                const correspondeMes = !mesSelecionado || (t.data ? t.data.slice(0, 7) === mesSelecionado : false);
                return correspondeCategoria && correspondeMes;
            });
        }

        function atualizarFiltros() {
            const categoriasPorTransacao = carregarMapaCategorias();
            renderizarLista(transacoes, categoriasPorTransacao);
        }

        // Calcular totais
        function calcularTotais(transacoes) {
            let receitas = 0;
            let despesas = 0;
            transacoes.forEach(t => {
                if (t.tipo === 'receita') {
                    receitas += parseFloat(t.valor || 0);
                } else {
                    despesas += parseFloat(t.valor || 0);
                }
            });
            return { receitas, despesas, saldo: receitas - despesas };
        }

        function carregarMapaCategorias() {
            const item = localStorage.getItem('valoremCategoriaPorTransacao');
            return item ? JSON.parse(item) : {};
        }

        function salvarMapaCategoria(id, categoria) {
            const mapa = carregarMapaCategorias();
            mapa[id] = categoria;
            localStorage.setItem('valoremCategoriaPorTransacao', JSON.stringify(mapa));
        }

        function renderizarLista(transacoes, categoriasPorTransacao) {
            const listaEl = document.getElementById('lista');
            const dadosFiltrados = aplicarFiltros(transacoes, categoriasPorTransacao);

            const totais = calcularTotais(dadosFiltrados);
            document.getElementById('totalReceitas').textContent = `R$ ${formatarValor(totais.receitas)}`;
            document.getElementById('totalDespesas').textContent = `R$ ${formatarValor(totais.despesas)}`;
            document.getElementById('saldoAtual').textContent = `R$ ${formatarValor(totais.saldo)}`;

            if (dadosFiltrados.length === 0) {
                listaEl.innerHTML = '<div class="empty-state">Nenhuma transação registrada para os filtros selecionados.</div>';
                return;
            }

            listaEl.innerHTML = dadosFiltrados.map(d => {
                const categoria = categoriasPorTransacao[d.id] || 'Sem categoria';
                return `
                    <div class="card">
                        <div class="info">
                            <h3>${d.descricao}</h3>
                            <p>
                                <span class="valor-tag ${d.tipo === 'receita' ? 'receita' : 'despesa'}">R$ ${formatarValor(d.valor)}</span> 
                                • ${d.data_formatada || formatarData(d.data)}
                                • ${d.tipo === 'receita' ? 'Receita' : 'Despesa'}
                                • <strong style="color: var(--text-muted);">${categoria}</strong>
                            </p>                        </div>
                        <div class="actions">
                            <button class="btn-editar" onclick="preencherForm(${d.id}, '${d.descricao}', ${d.valor}, '${d.data}', '${d.tipo}', '${categoria.replace(/'/g, "\\'")}')">
                                <i data-lucide="pencil" style="width:16px"></i>
                            </button>
                            <button class="btn-excluir" onclick="excluir(${d.id})">
                                <i data-lucide="trash-2" style="width:16px"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();
        }

        async function carregar() {
            try {
                const res = await fetch(API_URL);
                let dados = await res.json();

                // Ordenar por data de vencimento (mais próxima para mais distante)
                dados.sort((a, b) => new Date(a.data) - new Date(b.data));
                transacoes = dados;

                const categoriasPorTransacao = carregarMapaCategorias();
                popularFiltros(transacoes, categoriasPorTransacao);
                renderizarLista(transacoes, categoriasPorTransacao);
            } catch (error) {
                const listaEl = document.getElementById('lista');
                listaEl.innerHTML = '<div class="empty-state">Erro ao conectar com a API. Verifique se o servidor está rodando.</div>';
            }
        }

        async function excluir(id) {
            if(confirm('Deseja excluir esta despesa?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                carregar();
            }
        }

        function preencherForm(id, desc, valor, data, tipo, categoria) {
            // Armazena dados para edição e redireciona para página de cadastro
            localStorage.setItem('editarTransacao', JSON.stringify({ id, descricao: desc, valor, data, tipo, categoria }));
            window.location.href = 'cadastro.html';
        }

        carregar();
    </script>
</body>
</html>
